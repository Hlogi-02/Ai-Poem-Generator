<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>AI Poem Generator</title>
  </head>
  <body>
    <div class="Container">
      <header>
        <h1>Welcome to Ai poem Generator</h1>
      </header>
      <main>
        <form id="poem-generator-form">
          <input
            type="text"
            placeholder="Enter the topic of your poem"
            autofocus
            required
            autocomplete="off"
            class="instructions"
          />
          <input type="Submit" class="submit-btn" />
        </form>
        <div class="poem" id="poem"></div>
      </main>
      <footer>
        This AI project was coded by
        <a href="https://github.com/Hlogi-02" target="_blank"
          >Mahlogonolo Legodi</a
        >
        and
        <a href="https://github.com/Hlogi-02/Ai-Poem-Generator" target="_blank"
          >is open source on Github</a
        >
        and
        <a href="https://ai-poem-generators.netlify.app/" target="_blank"
          >is hosted on Netlify</a
        >
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
